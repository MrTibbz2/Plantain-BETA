<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plantain MIDI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            touch-action: manipulation;
            transition: background 0.3s, color 0.3s;
        }

        body.theme-purple {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        body.theme-light {
            background: #f0f2f5;
            color: #333;
        }

        body.theme-dark {
            background: #1a1a1a;
            color: #e0e0e0;
        }

        body.theme-ocean {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e22ce 100%);
            color: #fff;
        }

        body.theme-sunset {
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 50%, #ee5a6f 100%);
            color: #fff;
        }

        body.theme-trump {
            background: linear-gradient(135deg, #b8860b 0%, #ffd700 30%, #ff4500 70%, #8b0000 100%);
            color: #fff;
            position: relative;
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: clamp(12px, 3vw, 20px);
            gap: clamp(12px, 2vh, 16px);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            gap: 12px;
        }

        h1 {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: 600;
        }

        .theme-trump h1 {
            font-family: 'Impact', 'Arial Black', sans-serif;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 1px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .theme-switcher {
            position: relative;
        }

        .theme-button {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .theme-button:hover {
            background: rgba(255,255,255,0.3);
            transform: rotate(180deg);
        }

        .theme-button:focus {
            outline: 3px solid #ffd700;
            outline-offset: 2px;
        }

        .theme-menu {
            position: absolute;
            top: 45px;
            left: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 8px;
            display: none;
            flex-direction: column;
            gap: 4px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            z-index: 100;
            min-width: 140px;
        }

        .theme-menu.show {
            display: flex;
        }

        .theme-option {
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            color: #333;
            font-size: 0.9rem;
            transition: background 0.2s;
            border: none;
            background: transparent;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .theme-option:hover {
            background: rgba(0,0,0,0.1);
        }

        .theme-option.active {
            background: rgba(102,126,234,0.2);
            font-weight: 600;
        }

        .theme-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .theme-icon.purple {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .theme-icon.light {
            background: #f0f2f5;
            border: 2px solid #ddd;
        }

        .theme-icon.dark {
            background: #1a1a1a;
            border: 2px solid #333;
        }

        .theme-icon.ocean {
            background: linear-gradient(135deg, #1e3c72 0%, #7e22ce 100%);
        }

        .theme-icon.sunset {
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
        }

        .theme-icon.trump {
            background: linear-gradient(135deg, #ffd700 0%, #ff4500 100%);
        }

        .status-bar {
            display: flex;
            gap: clamp(8px, 2vw, 16px);
            font-size: clamp(0.75rem, 2vw, 0.9rem);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: background 0.3s;
        }

        .status-dot.active {
            background: #4caf50;
            box-shadow: 0 0 8px #4caf50;
        }

        .status-dot.warning {
            background: #ff9800;
            box-shadow: 0 0 8px #ff9800;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: clamp(10px, 2vh, 16px);
            min-height: 0;
        }

        .card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: clamp(12px, 3vw, 20px);
            color: #333;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .theme-light .card {
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .theme-dark .card {
            background: rgba(40,40,40,0.95);
            color: #e0e0e0;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .theme-trump .card {
            background: rgba(255,255,255,0.98);
            border: 3px solid #ffd700;
            box-shadow: 0 8px 32px rgba(255,215,0,0.3);
            position: relative;
            overflow: hidden;
        }

        .theme-trump .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 1;
            pointer-events: none;
            z-index: 0;
        }

        .theme-trump .card:first-of-type::before {
            background-image: url('trump-photos/1Uwwtr-gTEC4S-KY2IGqbg.webp');
            background-position: right center;
            background-size: 180px;
        }

        .theme-trump .mappings-card::before {
            background-image: url('trump-photos/american eagle.jpg');
            background-position: center;
            background-size: 200px;
        }

        .theme-trump .card > * {
            position: relative;
            z-index: 1;
        }

        .card h2 {
            font-size: clamp(1rem, 3vw, 1.25rem);
            margin-bottom: clamp(10px, 2vh, 16px);
            color: #667eea;
        }

        .theme-light .card h2 {
            color: #2196f3;
        }

        .theme-dark .card h2 {
            color: #bb86fc;
        }

        .theme-ocean .card h2 {
            color: #7e22ce;
        }

        .theme-sunset .card h2 {
            color: #ff4500;
        }

        .theme-trump .card h2 {
            color: #ff4500;
            font-family: 'Impact', 'Arial Black', sans-serif;
            text-transform: uppercase;
        }

        .config-header {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: clamp(8px, 1.5vh, 12px);
        }

        select {
            flex: 1;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            padding: clamp(8px, 2vw, 12px);
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            color: #333;
        }

        .theme-dark select {
            background: #2a2a2a;
            color: #e0e0e0;
            border-color: #444;
        }

        .theme-trump select {
            border: 2px solid #ffd700;
            font-weight: 600;
        }

        .btn-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
            gap: 8px;
        }

        button {
            font-size: clamp(0.85rem, 2vw, 0.95rem);
            padding: clamp(8px, 2vw, 12px);
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        .theme-light button {
            background: #2196f3;
        }

        .theme-dark button {
            background: #bb86fc;
        }

        .theme-ocean button {
            background: #7e22ce;
        }

        .theme-sunset button {
            background: #ff6b6b;
        }

        .theme-trump button {
            background: linear-gradient(135deg, #ffd700 0%, #ff4500 100%);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: 2px solid #b8860b;
        }

        button:focus {
            outline: 3px solid #ffd700;
            outline-offset: 2px;
        }

        button:active {
            transform: scale(0.95);
        }

        button.danger {
            background: #f44336;
        }

        .theme-trump button.danger {
            background: linear-gradient(135deg, #ff0000 0%, #8b0000 100%);
        }

        .mappings-card {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .button-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: clamp(8px, 1.5vh, 12px);
            overflow-y: auto;
        }

        .button-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            padding: clamp(12px, 2.5vw, 16px);
            color: white;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .theme-light .button-card {
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            color: #1565c0;
            border: 2px solid #90caf9;
        }

        .theme-dark .button-card {
            background: linear-gradient(135deg, #2a2a2a 0%, #3a3a3a 100%);
            color: #e0e0e0;
            border: 2px solid #555;
        }

        .theme-ocean .button-card {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
        }

        .theme-sunset .button-card {
            background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
        }

        .theme-trump .button-card {
            background: linear-gradient(135deg, #ffd700 0%, #ff4500 100%);
            border: 3px solid #b8860b;
            box-shadow: 0 4px 12px rgba(255,215,0,0.4);
            position: relative;
            overflow: hidden;
        }

        .theme-trump .button-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 1;
            pointer-events: none;
            z-index: 0;
        }

        .theme-trump .button-card:nth-child(1)::before {
            background-image: url('trump-photos/71I1Jhy8wCL._AC_UF894,1000_QL80_.jpg');
        }

        .theme-trump .button-card:nth-child(2)::before {
            background-image: url('trump-photos/mustang.avif');
        }

        .theme-trump .button-card:nth-child(3)::before {
            background-image: url('trump-photos/images.jpg');
        }

        .theme-trump .button-card:nth-child(4)::before {
            background-image: url('trump-photos/images (1).jpg');
        }

        .theme-trump .button-card > * {
            position: relative;
            z-index: 1;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .theme-trump .button-card input {
            text-shadow: none;
        }

        .button-card h3 {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            margin-bottom: 4px;
        }

        .note-display {
            font-size: clamp(1rem, 3vw, 1.3rem);
            font-weight: 700;
            text-align: center;
            padding: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .theme-light .note-display {
            background: rgba(0,0,0,0.1);
        }

        .theme-dark .note-display {
            background: rgba(255,255,255,0.1);
        }

        .theme-trump .note-display {
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(255,215,0,0.5);
        }

        .button-card label {
            font-size: clamp(0.75rem, 2vw, 0.85rem);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .button-card input {
            font-size: clamp(0.85rem, 2.5vw, 0.95rem);
            padding: 6px;
            border: none;
            border-radius: 6px;
            background: rgba(255,255,255,0.9);
            color: #333;
        }

        .theme-light .button-card input {
            background: white;
            border: 2px solid #90caf9;
        }

        .theme-dark .button-card input {
            background: #1a1a1a;
            color: #e0e0e0;
            border: 2px solid #555;
        }

        .theme-trump .button-card input {
            border: 2px solid #b8860b;
            font-weight: 600;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: clamp(20px, 4vw, 32px);
            max-width: 400px;
            width: 100%;
            color: #333;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-content h3 {
            font-size: clamp(1.1rem, 3vw, 1.4rem);
            margin-bottom: 16px;
            color: #667eea;
        }

        .modal-content label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .modal-content input {
            width: 100%;
            font-size: 1rem;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 16px;
            color: #333;
        }

        .theme-dark .modal-content input {
            background: #2a2a2a;
            border-color: #444;
            color: #e0e0e0;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-buttons button {
            flex: 1;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.9rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 2000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: #4caf50;
        }

        .toast.error {
            background: #f44336;
        }

        @media (max-width: 600px) {
            .button-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <div class="theme-switcher">
                    <button class="theme-button" id="theme-button" aria-label="Change theme">🎨</button>
                    <div class="theme-menu" id="theme-menu">
                        <button class="theme-option" data-theme="purple">
                            <span class="theme-icon purple"></span>
                            Purple
                        </button>
                        <button class="theme-option" data-theme="light">
                            <span class="theme-icon light"></span>
                            Light
                        </button>
                        <button class="theme-option" data-theme="dark">
                            <span class="theme-icon dark"></span>
                            Dark
                        </button>
                        <button class="theme-option" data-theme="ocean">
                            <span class="theme-icon ocean"></span>
                            Ocean
                        </button>
                        <button class="theme-option" data-theme="sunset">
                            <span class="theme-icon sunset"></span>
                            Sunset
                        </button>
                        <button class="theme-option" data-theme="trump">
                            <span class="theme-icon trump"></span>
                            Trump
                        </button>
                    </div>
                </div>
                <h1>Plantain MIDI</h1>
            </div>
            <div class="status-bar" role="status" aria-live="polite">
                <div class="status-item">
                    <span class="status-dot" id="wifi-status" aria-hidden="true"></span>
                    <span id="wifi-text" class="sr-only">WiFi: Disconnected</span>
                </div>
                <div class="status-item">
                    <span class="status-dot" id="bluetooth-status" aria-hidden="true"></span>
                    <span id="bluetooth-text" class="sr-only">Bluetooth: Disconnected</span>
                </div>
                <div class="status-item">
                    <span class="status-dot" id="temp-status" aria-hidden="true"></span>
                    <span id="temp-text" class="sr-only">Temp: --°C</span>
                </div>
            </div>
        </header>

        <main>
            <div class="card">
                <h2>Configuration</h2>
                <div class="config-header">
                    <select id="config-select" aria-label="Select configuration">
                        <option value="">Loading...</option>
                    </select>
                </div>
                <div class="btn-group">
                    <button id="load-btn">Load</button>
                    <button id="save-btn">Save</button>
                    <button id="new-btn">New</button>
                    <button id="delete-btn" class="danger">Delete</button>
                </div>
            </div>

            <div class="card mappings-card">
                <h2>Button Mappings</h2>
                <div class="button-grid" id="button-grid">
                    <div class="button-card">
                        <h3>Button 0</h3>
                        <div class="note-display" id="note-display-0">C4</div>
                        <label>
                            Note
                            <input type="number" data-button="0" data-field="note" min="0" max="127" value="60">
                        </label>
                        <label>
                            Velocity
                            <input type="number" data-button="0" data-field="velocity" min="0" max="127" value="100">
                        </label>
                    </div>
                    <div class="button-card">
                        <h3>Button 1</h3>
                        <div class="note-display" id="note-display-1">D4</div>
                        <label>
                            Note
                            <input type="number" data-button="1" data-field="note" min="0" max="127" value="62">
                        </label>
                        <label>
                            Velocity
                            <input type="number" data-button="1" data-field="velocity" min="0" max="127" value="100">
                        </label>
                    </div>
                    <div class="button-card">
                        <h3>Button 2</h3>
                        <div class="note-display" id="note-display-2">E4</div>
                        <label>
                            Note
                            <input type="number" data-button="2" data-field="note" min="0" max="127" value="64">
                        </label>
                        <label>
                            Velocity
                            <input type="number" data-button="2" data-field="velocity" min="0" max="127" value="100">
                        </label>
                    </div>
                    <div class="button-card">
                        <h3>Button 3</h3>
                        <div class="note-display" id="note-display-3">G4</div>
                        <label>
                            Note
                            <input type="number" data-button="3" data-field="note" min="0" max="127" value="67">
                        </label>
                        <label>
                            Velocity
                            <input type="number" data-button="3" data-field="velocity" min="0" max="127" value="100">
                        </label>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 id="modal-title">Enter Name</h3>
            <label for="modal-input" id="modal-label">Config Name</label>
            <input type="text" id="modal-input" autocomplete="off">
            <div class="modal-buttons">
                <button id="modal-cancel">Cancel</button>
                <button id="modal-confirm">Confirm</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast" role="alert"></div>

    <script src="script.js"></script>
</body>
</html>
